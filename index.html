<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 주식 매매 타점</title>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d;
  --text:#e6edf3; --text2:#8b949e;
  --green:#3fb950; --red:#f85149; --blue:#58a6ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
header h1{font-size:17px;font-weight:700;}
.header-right{display:flex;align-items:center;gap:10px;}
.refresh-btn{background:var(--blue);color:#000;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;}
.refresh-btn:hover{opacity:.85;}
.last-updated{color:var(--text2);font-size:12px;}

/* Progress bar */
.progress-wrap{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 24px;display:none;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.progress-label{font-size:13px;color:var(--text);}
.progress-detail{font-size:12px;color:var(--text2);}
.progress-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .5s;}

.container{max-width:1500px;margin:0 auto;padding:16px 24px;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.tab{padding:7px 16px;border-radius:8px;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;}
.tab.active{background:var(--blue);color:#000;border-color:var(--blue);}
.tab .cnt{font-size:11px;opacity:.75;margin-left:4px;}

/* Summary */
.summary-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.sc .num{font-size:26px;font-weight:700;}
.sc .lbl{color:var(--text2);font-size:11px;margin-top:3px;}
.n-sb{color:#3fb950;} .n-b{color:#4ade80;} .n-n{color:var(--text2);} .n-s{color:#f87171;} .n-ss{color:#f85149;}

/* Filter bar */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-bar label{color:var(--text2);font-size:12px;margin-right:2px;}
.fbtn{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;}
.fbtn:hover{border-color:var(--blue);color:var(--blue);}
.fbtn.active{background:var(--blue);color:#000;border-color:var(--blue);}

/* Search */
.top-controls{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.search-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:13px;width:220px;outline:none;}
.search-input:focus{border-color:var(--blue);}
.search-input::placeholder{color:var(--text2);}
.per-page-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:13px;cursor:pointer;}

/* Table */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--bg3);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:10px 12px;}

.sig-badge{display:inline-block;padding:2px 8px;border-radius:16px;font-size:11px;font-weight:700;}
.sig-강력매수{background:rgba(63,185,80,.2);color:#3fb950;border:1px solid #3fb950;}
.sig-매수{background:rgba(63,185,80,.1);color:#4ade80;border:1px solid #4ade80;}
.sig-중립{background:rgba(110,118,129,.15);color:#8b949e;border:1px solid #8b949e;}
.sig-매도{background:rgba(248,81,73,.1);color:#f87171;border:1px solid #f87171;}
.sig-강력매도{background:rgba(248,81,73,.2);color:#f85149;border:1px solid #f85149;}
.sig-오류,.sig-미계산,.sig-null{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}

.pu{color:var(--green);} .pd{color:var(--red);} .pf{color:var(--text2);}
.rsi-wrap{display:flex;align-items:center;gap:6px;}
.rsi-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;max-width:60px;}
.rsi-fill{height:100%;border-radius:3px;}
.dots{display:flex;gap:3px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-b{background:var(--green);} .dot-s{background:var(--red);} .dot-n{background:var(--text2);}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;}
.pg-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;}
.pg-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);}
.pg-btn:disabled{opacity:.35;cursor:default;}
.pg-info{color:var(--text2);font-size:13px;}
.pg-jump{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;}
.pg-jump input{width:54px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;text-align:center;font-size:13px;outline:none;}

/* Loading */
.loading{text-align:center;padding:50px;color:var(--text2);font-size:15px;}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:90%;max-width:860px;max-height:90vh;overflow-y:auto;padding:22px;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:17px;font-weight:700;}
.cls-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;}
.cls-btn:hover{color:var(--text);}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.dc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;}
.dc .lbl{color:var(--text2);font-size:11px;margin-bottom:5px;}
.dc .val{font-size:17px;font-weight:700;}
.dc .sub{color:var(--text2);font-size:11px;margin-top:3px;}
.chart-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
#chart{height:300px;}
.sig-exp{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;}
.sig-exp h3{font-size:13px;color:var(--text2);margin-bottom:10px;}
.sig-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.sig-row:last-child{border-bottom:none;}
.sig-lbl{width:130px;color:var(--text2);font-size:12px;}
.sig-val{font-size:13px;font-weight:500;}
</style>
</head>
<body>

<header>
  <h1>📈 주식 매매 타점</h1>
  <div class="header-right">
    <span class="last-updated" id="updated">-</span>
    <button class="refresh-btn" onclick="loadPage()">🔄 새로고침</button>
  </div>
</header>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-top">
    <span class="progress-label" id="prog-label">업데이트 중...</span>
    <span class="progress-detail" id="prog-detail"></span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="container">
  <div class="tabs" id="tabs">
    <div class="tab active" data-market="KOSPI">🇰🇷 KOSPI<span class="cnt" id="cnt-KOSPI"></span></div>
    <div class="tab" data-market="KOSDAQ">🇰🇷 KOSDAQ<span class="cnt" id="cnt-KOSDAQ"></span></div>
    <div class="tab" data-market="NASDAQ">🇺🇸 NASDAQ<span class="cnt" id="cnt-NASDAQ"></span></div>
    <div class="tab" data-market="SP500">🇺🇸 S&P500<span class="cnt" id="cnt-SP500"></span></div>
  </div>

  <div class="summary-bar" id="summary-bar">
    <div class="sc"><div class="num n-sb" id="s-sb">-</div><div class="lbl">강력매수</div></div>
    <div class="sc"><div class="num n-b"  id="s-b">-</div><div class="lbl">매수</div></div>
    <div class="sc"><div class="num n-n"  id="s-n">-</div><div class="lbl">중립</div></div>
    <div class="sc"><div class="num n-s"  id="s-s">-</div><div class="lbl">매도</div></div>
    <div class="sc"><div class="num n-ss" id="s-ss">-</div><div class="lbl">강력매도</div></div>
  </div>

  <div class="filter-bar">
    <label>신호 필터:</label>
    <button class="fbtn active" data-signal="">전체</button>
    <button class="fbtn" data-signal="강력매수">강력매수</button>
    <button class="fbtn" data-signal="매수">매수</button>
    <button class="fbtn" data-signal="중립">중립</button>
    <button class="fbtn" data-signal="매도">매도</button>
    <button class="fbtn" data-signal="강력매도">강력매도</button>
  </div>

  <div class="top-controls">
    <input class="search-input" type="text" id="search" placeholder="종목명 / 티커 검색..." oninput="onSearch()">
    <select class="per-page-sel" id="per-page" onchange="onPerPage(this.value)">
      <option value="25">25개</option>
      <option value="50" selected>50개</option>
      <option value="100">100개</option>
    </select>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loading"><span class="spinner"></span>데이터 로딩 중...</div>
    <table id="stock-table" style="display:none">
      <thead><tr>
        <th>종목</th><th>현재가</th><th>등락</th><th>신호</th>
        <th>RSI(14)</th><th>RSI신호</th><th>MACD</th><th>이동평균</th><th>인디</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div><span class="modal-title" id="m-title"></span><span id="m-sig" style="margin-left:8px"></span></div>
      <button class="cls-btn" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
    </div>
    <div class="detail-grid" id="m-grid"></div>
    <div class="chart-box">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">3개월 종가 차트</div>
      <div id="chart"></div>
    </div>
    <div class="sig-exp" id="m-exp"></div>
  </div>
</div>

<script>
const state = {
  market: 'KOSPI', page: 1, perPage: 50,
  search: '', signal: '', totalPages: 0
};
let chartInst = null;
let searchTimer = null;
let sseSource = null;

// ── Tab setup ──────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => switchMarket(t.dataset.market);
});
document.querySelectorAll('.fbtn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.fbtn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    state.signal = b.dataset.signal;
    state.page = 1;
    loadPage();
  };
});

function switchMarket(m) {
  state.market = m; state.page = 1; state.search = ''; state.signal = '';
  document.getElementById('search').value = '';
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', b.dataset.signal === ''));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.market === m));
  loadPage();
  loadSummary();
}

// ── Data loading ───────────────────────────────────────
async function loadPage() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('stock-table').style.display = 'none';
  document.getElementById('pagination').innerHTML = '';
  const p = state;
  const url = `/api/stocks/${p.market}?page=${p.page}&per_page=${p.perPage}&search=${encodeURIComponent(p.search)}&signal=${encodeURIComponent(p.signal)}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    state.totalPages = data.pages || 1;
    renderTable(data.items || [], data.total || 0);
    renderPagination(data.total, data.pages);
    const now = new Date().toLocaleTimeString('ko-KR');
    document.getElementById('updated').textContent = `업데이트: ${now}`;
  } catch(e) {
    document.getElementById('loading').innerHTML = '❌ 로드 실패. 서버를 확인해주세요.';
  }
}

async function loadSummary() {
  try {
    const res = await fetch(`/api/summary/${state.market}`);
    const d = await res.json();
    document.getElementById('s-sb').textContent = (d['강력매수'] || 0).toLocaleString();
    document.getElementById('s-b').textContent  = (d['매수']     || 0).toLocaleString();
    document.getElementById('s-n').textContent  = (d['중립']     || 0).toLocaleString();
    document.getElementById('s-s').textContent  = (d['매도']     || 0).toLocaleString();
    document.getElementById('s-ss').textContent = (d['강력매도'] || 0).toLocaleString();
    if (d.total) document.getElementById(`cnt-${state.market}`).textContent = ` (${d.total.toLocaleString()})`;
  } catch(e) {}
}

async function loadAllCounts() {
  for (const m of ['KOSPI','KOSDAQ','NASDAQ','SP500']) {
    try {
      const res = await fetch(`/api/summary/${m}`);
      const d = await res.json();
      if (d.total) document.getElementById(`cnt-${m}`).textContent = ` (${d.total.toLocaleString()})`;
    } catch(e) {}
  }
}

// ── Render table ────────────────────────────────────────
function renderTable(items, total) {
  document.getElementById('loading').style.display = 'none';
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text2)">
      ${total === 0 ? '데이터 로딩 중입니다. 잠시 후 새로고침 해주세요.' : '검색 결과가 없습니다.'}
    </td></tr>`;
    document.getElementById('stock-table').style.display = 'table';
    return;
  }

  const isKR = (state.market === 'KOSPI' || state.market === 'KOSDAQ');
  items.forEach(s => {
    const pct = s.price_change_pct;
    const cc = pct > 0 ? 'pu' : pct < 0 ? 'pd' : 'pf';
    const ps = pct != null ? (pct > 0 ? '+' : '') + pct.toFixed(2) + '%' : '-';
    const price = s.price != null ? (isKR ? Math.round(s.price).toLocaleString() + '원' : '$' + s.price.toFixed(2)) : '-';
    const sig = s.signal || '미계산';
    const rsi = s.rsi != null ? s.rsi.toFixed(1) : '-';
    const rc = s.rsi < 30 ? '#3fb950' : s.rsi > 70 ? '#f85149' : '#8b949e';
    const rsiPct = s.rsi != null ? Math.min(100, s.rsi) : 0;
    const dots = [s.rsi_signal, s.macd_signal, s.ma_signal].map(x => {
      const dc = x && x.includes('매수') ? 'dot-b' : x && x.includes('매도') ? 'dot-s' : 'dot-n';
      return `<span class="dot ${dc}" title="${x||'-'}"></span>`;
    }).join('');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div style="font-weight:600">${s.name}</div><div style="color:var(--text2);font-size:11px">${s.ticker}</div></td>
      <td style="font-weight:600">${price}</td>
      <td class="${cc}" style="font-weight:500">${ps}</td>
      <td><span class="sig-badge sig-${sig}">${sig}</span></td>
      <td><div class="rsi-wrap"><span style="color:${rc};font-weight:600;min-width:32px;font-size:13px">${rsi}</span>
        <div class="rsi-bar"><div class="rsi-fill" style="width:${rsiPct}%;background:${rc}"></div></div></div></td>
      <td style="color:${sigCol(s.rsi_signal)};font-size:12px">${s.rsi_signal||'-'}</td>
      <td style="color:var(--text2);font-size:11px">${s.macd_signal||'-'}</td>
      <td style="color:var(--text2);font-size:11px">${s.ma_signal||'-'}</td>
      <td><div class="dots">${dots}</div></td>`;
    tr.onclick = () => openModal(s, isKR);
    tbody.appendChild(tr);
  });
  document.getElementById('stock-table').style.display = 'table';
}

// ── Pagination ──────────────────────────────────────────
function renderPagination(total, pages) {
  if (!pages || pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  const p = state.page;
  const pg = document.getElementById('pagination');
  pg.innerHTML = `
    <button class="pg-btn" onclick="goPage(1)" ${p<=1?'disabled':''}>«</button>
    <button class="pg-btn" onclick="goPage(${p-1})" ${p<=1?'disabled':''}>‹ 이전</button>
    <span class="pg-info">${p.toLocaleString()} / ${pages.toLocaleString()} 페이지 &nbsp; (총 ${total.toLocaleString()}개)</span>
    <button class="pg-btn" onclick="goPage(${p+1})" ${p>=pages?'disabled':''}>다음 ›</button>
    <button class="pg-btn" onclick="goPage(${pages})" ${p>=pages?'disabled':''}>»</button>
    <div class="pg-jump"><span>이동:</span>
      <input type="number" min="1" max="${pages}" value="${p}" onchange="goPage(parseInt(this.value))">
    </div>`;
}

function goPage(n) {
  const p = Math.max(1, Math.min(n, state.totalPages));
  if (p === state.page) return;
  state.page = p;
  loadPage();
  window.scrollTo(0, 0);
}

// ── Search / per-page ───────────────────────────────────
function onSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.search = document.getElementById('search').value;
    state.page = 1;
    loadPage();
  }, 400);
}
function onPerPage(v) { state.perPage = parseInt(v); state.page = 1; loadPage(); }

// ── SSE Progress ────────────────────────────────────────
function startSSE() {
  if (sseSource) sseSource.close();
  sseSource = new EventSource('/api/progress/stream');
  sseSource.addEventListener('progress', e => {
    const p = JSON.parse(e.data);
    const wrap = document.getElementById('progress-wrap');
    if (p.status === 'running') {
      wrap.style.display = 'block';
      document.getElementById('prog-fill').style.width = p.pct + '%';
      document.getElementById('prog-label').textContent =
        `데이터 업데이트 중... ${(p.done||0).toLocaleString()} / ${(p.total||0).toLocaleString()}개`;
      const eta = p.eta_sec ? ` · 예상 ${Math.ceil(p.eta_sec/60)}분 후 완료` : '';
      document.getElementById('prog-detail').textContent = `${p.pct}%${eta}`;
    } else {
      wrap.style.display = 'none';
      if (p.status === 'done') {
        setTimeout(() => { loadPage(); loadSummary(); loadAllCounts(); }, 1000);
        // Reconnect for next cycle
        setTimeout(startSSE, 3000);
      }
    }
  });
  sseSource.onerror = () => { setTimeout(startSSE, 10000); };
}

// ── Modal ───────────────────────────────────────────────
async function openModal(s, isKR) {
  const pu = isKR ? '원' : '$';
  document.getElementById('m-title').textContent = `${s.name}  (${s.ticker})`;
  document.getElementById('m-sig').innerHTML = `<span class="sig-badge sig-${s.signal||'미계산'}">${s.signal||'미계산'}</span>`;

  const price = s.price != null ? (isKR ? Math.round(s.price).toLocaleString()+pu : pu+s.price.toFixed(2)) : '-';
  const chg   = s.price_change_pct != null ? (s.price_change_pct>0?'+':'')+s.price_change_pct.toFixed(2)+'%' : '-';
  const rsiSub = s.rsi < 30 ? '과매도' : s.rsi > 70 ? '과매수' : '중립 구간';
  document.getElementById('m-grid').innerHTML = [
    {l:'현재가', v:price, sub:''},
    {l:'등락률', v:chg,  sub: s.price_change!=null?(s.price_change>0?'+':'')+s.price_change.toFixed(2)+pu:''},
    {l:'RSI (14)', v:s.rsi!=null?s.rsi.toFixed(1):'-', sub:s.rsi!=null?rsiSub:''},
    {l:'5일 이동평균',  v:s.ma5!=null?(isKR?Math.round(s.ma5).toLocaleString():s.ma5.toFixed(2)):'-', sub:''},
    {l:'20일 이동평균', v:s.ma20!=null?(isKR?Math.round(s.ma20).toLocaleString():s.ma20.toFixed(2)):'-', sub:''},
    {l:'종합 점수', v:(s.score>0?'+':'')+s.score, sub:'(-3 ~ +3)'},
  ].map(x=>`<div class="dc"><div class="lbl">${x.l}</div><div class="val">${x.v}</div><div class="sub">${x.sub}</div></div>`).join('');

  document.getElementById('m-exp').innerHTML = `
    <h3>📊 지표별 신호</h3>
    <div class="sig-row"><span class="sig-lbl">RSI (14)</span>
      <span class="sig-val" style="color:${sigCol(s.rsi_signal)}">${s.rsi_signal||'-'}</span>
      <span style="color:var(--text2);font-size:11px;margin-left:8px">RSI ${s.rsi!=null?s.rsi.toFixed(1):'-'} · 30↓매수 70↑매도</span></div>
    <div class="sig-row"><span class="sig-lbl">MACD</span>
      <span class="sig-val" style="color:${sigCol(s.macd_signal)}">${s.macd_signal||'-'}</span>
      <span style="color:var(--text2);font-size:11px;margin-left:8px">히스토그램 크로스 기준</span></div>
    <div class="sig-row"><span class="sig-lbl">이동평균 (5/20)</span>
      <span class="sig-val" style="color:${sigCol(s.ma_signal)}">${s.ma_signal||'-'}</span>
      <span style="color:var(--text2);font-size:11px;margin-left:8px">5MA vs 20MA 크로스</span></div>`;

  document.getElementById('overlay').classList.add('open');

  const chartEl = document.getElementById('chart');
  chartEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text2)"><span class="spinner"></span>로딩중...</div>';
  try {
    const res = await fetch(`/api/chart/${s.ticker}`);
    const cd = await res.json();
    chartEl.innerHTML = '';
    if (chartInst) chartInst.remove();
    chartInst = LightweightCharts.createChart(chartEl, {
      width: chartEl.clientWidth, height: 280,
      layout:{background:{color:'#21262d'},textColor:'#8b949e'},
      grid:{vertLines:{color:'#30363d'},horzLines:{color:'#30363d'}},
      timeScale:{borderColor:'#30363d'},rightPriceScale:{borderColor:'#30363d'},
    });
    const series = chartInst.addAreaSeries({lineColor:'#58a6ff',topColor:'rgba(88,166,255,.3)',bottomColor:'rgba(88,166,255,.02)',lineWidth:2});
    series.setData(cd.dates.map((d,i)=>({time:d,value:cd.prices[i]})));
    chartInst.timeScale().fitContent();
  } catch(e) {
    chartEl.innerHTML = '<div style="color:var(--text2);padding:30px;text-align:center">차트 데이터 없음</div>';
  }
}

function closeModal(e) { if(e.target.id==='overlay') document.getElementById('overlay').classList.remove('open'); }
function sigCol(s) {
  if(!s) return 'var(--text2)';
  if(s.includes('매수')||s==='상승추세') return 'var(--green)';
  if(s.includes('매도')||s==='하락추세') return 'var(--red)';
  return 'var(--text2)';
}

// ── Init ────────────────────────────────────────────────
window.onload = async () => {
  startSSE();
  loadSummary();
  loadAllCounts();
  loadPage();
};
</script>
</body>
</html>
